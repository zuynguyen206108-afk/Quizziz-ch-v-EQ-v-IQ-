<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz IQ & EQ</title>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Be Vietnam Pro',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:
    linear-gradient(rgba(40,0,60,0.75),rgba(10,10,30,0.9)),
    url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1400&auto=format&fit=crop');

    background-size:cover;
    background-position:center;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    width:700px;
    height:700px;
    background:radial-gradient(circle,#00e5ff44,transparent 70%);
    top:-150px;
    right:-150px;
    animation: glow 5s infinite alternate;
}

@keyframes glow{
    from{
        transform:scale(1);
        opacity:0.5;
    }
    to{
        transform:scale(1.2);
        opacity:0.9;
    }
}

/* START SCREEN */

.start-screen{
    position:fixed;
    inset:0;

    background:
    linear-gradient(rgba(0,0,0,0.75),rgba(20,20,40,0.9)),
    url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1400&auto=format&fit=crop');

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:9999;
}

.start-content{
    text-align:center;
    padding:50px;
    border-radius:25px;
    background:rgba(0,0,0,0.55);
    border:2px solid rgba(0,229,255,0.3);
    box-shadow:0 0 40px rgba(0,229,255,0.2);
}

.start-title{
    font-size:70px;
    font-weight:800;
    color:#00e5ff;
    margin-bottom:20px;
}

.start-subtitle{
    color:white;
    font-size:24px;
    line-height:1.7;
    margin-bottom:40px;
}

.start-btn{
    padding:20px 60px;
    border:none;
    border-radius:18px;
    font-size:28px;
    font-weight:800;
    cursor:pointer;

    background:linear-gradient(135deg,#00e5ff,#00bcd4);

    color:#001b24;

    transition:0.35s;
}

.start-btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px rgba(0,229,255,0.5);
}

/* QUIZ */

.quiz-box{
    width:900px;
    max-width:95%;
    background:rgba(10,10,20,0.88);
    border:2px solid rgba(0,229,255,0.3);
    border-radius:22px;
    padding:40px;
    position:relative;
    z-index:10;

    box-shadow:
    0 0 25px rgba(0,229,255,0.15),
    0 0 70px rgba(0,0,0,0.7);

    display:none;
}

.top-title{
    text-align:center;
    color:#00e5ff;
    font-size:52px;
    font-weight:800;
    margin-bottom:10px;
}

.sub-title{
    text-align:center;
    color:#eee;
    font-size:20px;
    margin-bottom:40px;
}

.question-box{
    background:linear-gradient(135deg,#16213e,#0f3460);
    border-left:6px solid #00e5ff;
    padding:28px;
    border-radius:18px;
    margin-bottom:30px;
}

.question{
    color:white;
    font-size:30px;
    line-height:1.6;
    font-weight:700;
}

.answers{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.answers button{
    padding:22px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:19px;
    cursor:pointer;
    transition:0.35s;
}

.answers button:hover{
    transform:translateY(-5px);
    background:rgba(0,229,255,0.15);
}

.correct{
    background:linear-gradient(135deg,#00c853,#009624)!important;
}

.wrong{
    background:linear-gradient(135deg,#ff1744,#b2102f)!important;
}

.result{
    margin-top:28px;
    text-align:center;
    font-size:30px;
    font-weight:800;
    color:#00e5ff;
    min-height:40px;
}

.next-btn{
    margin-top:25px;
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,#00e5ff,#00bcd4);
    color:#001b24;
    font-size:22px;
    font-weight:800;
    cursor:pointer;
    display:none;
}

.footer{
    margin-top:35px;
    text-align:center;
    color:#cccccc;
    font-size:15px;
}

@media(max-width:768px){

    .top-title{
        font-size:36px;
    }

    .question{
        font-size:24px;
    }

    .answers{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<div class="start-screen" id="startScreen">

    <div class="start-content">

        <div class="start-title">
            QUIZ IQ & EQ
        </div>

        <div class="start-subtitle">
            Kiểm tra khả năng tư duy logic<br>
            và trí tuệ cảm xúc của bạn
        </div>

        <button class="start-btn" id="startBtn">
            BẮT ĐẦU
        </button>

    </div>

</div>

<div class="quiz-box" id="quizBox">

    <div class="top-title">
        QUIZ IQ & EQ
    </div>

    <div class="sub-title">
        Chủ đề: IQ • EQ • Tư duy • Cảm xúc
    </div>

    <div class="question-box">
        <div class="question" id="question"></div>
    </div>

    <div class="answers" id="answers"></div>

    <div class="result" id="result"></div>

    <button class="next-btn" id="nextBtn">
        TIẾP TỤC →
    </button>

    <div class="footer">
        Bài Quiz kiểm tra IQ & EQ
    </div>

</div>

<script>

const quizData = [

{
question:"IQ (Intelligence Quotient) chủ yếu dùng để đánh giá khả năng nào?",
answers:[
"Khả năng giao tiếp",
"Khả năng tư duy logic và giải quyết vấn đề",
"Khả năng ca hát",
"Khả năng chơi thể thao"
],
correct:1
},

{
question:"EQ (Emotional Quotient) là chỉ số liên quan đến điều gì?",
answers:[
"Tốc độ phản xạ",
"Trí nhớ ngắn hạn",
"Khả năng nhận biết và kiểm soát cảm xúc",
"Sức mạnh cơ bắp"
],
correct:2
},

{
question:"Người có EQ cao thường sẽ làm gì khi xảy ra mâu thuẫn?",
answers:[
"Tức giận và bỏ đi",
"Bình tĩnh lắng nghe và giải quyết vấn đề",
"Đổ lỗi cho người khác",
"Im lặng hoàn toàn"
],
correct:1
},

{
question:"Trong học tập, IQ giúp ích nhiều nhất ở khả năng nào?",
answers:[
"Suy luận và tiếp thu kiến thức",
"Chơi game nhanh",
"Hát hay hơn",
"Ghi nhớ bài hát"
],
correct:0
},

{
question:"Sự kết hợp nào giúp con người phát triển toàn diện hơn?",
answers:[
"Chỉ IQ cao",
"Chỉ EQ cao",
"Kết hợp cả IQ và EQ",
"Không cần IQ và EQ"
],
correct:2
}

];

let currentQuestion = 0;

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const resultEl = document.getElementById("result");
const nextBtn = document.getElementById("nextBtn");

const startBtn = document.getElementById("startBtn");
const startScreen = document.getElementById("startScreen");
const quizBox = document.getElementById("quizBox");

startBtn.addEventListener("click",()=>{

    startScreen.style.display = "none";
    quizBox.style.display = "block";

    loadQuestion();

});

function loadQuestion(){

    resultEl.innerHTML = "";
    nextBtn.style.display = "none";

    const current = quizData[currentQuestion];

    questionEl.innerHTML =
    `Câu ${currentQuestion + 1}: ${current.question}`;

    answersEl.innerHTML = "";

    current.answers.forEach((answer,index)=>{

        const button = document.createElement("button");

        button.innerHTML = answer;

        button.addEventListener("click",()=>checkAnswer(index,button));

        answersEl.appendChild(button);

    });

}

function checkAnswer(index,button){

    const current = quizData[currentQuestion];

    const buttons = answersEl.querySelectorAll("button");

    buttons.forEach(btn=>btn.disabled = true);

    if(index === current.correct){

        button.classList.add("correct");

        resultEl.innerHTML = "CHÍNH XÁC";

    }else{

        button.classList.add("wrong");

        if(buttons[current.correct]){
            buttons[current.correct].classList.add("correct");
        }

        resultEl.innerHTML = "ĐÁP ÁN CHƯA ĐÚNG";

    }

    nextBtn.style.display = "block";

}

nextBtn.addEventListener("click",()=>{

    currentQuestion++;

    if(currentQuestion < quizData.length){

        loadQuestion();

    }else{

        questionEl.innerHTML =
        "HOÀN THÀNH PHẦN THI";

        answersEl.innerHTML = "";

        resultEl.innerHTML =
        "Cảm ơn bạn đã tham gia bài Quiz IQ & EQ";

        nextBtn.style.display = "none";

    }

});

</script>

</body>
</html>
